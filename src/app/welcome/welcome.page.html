<ion-content [fullscreen]="true" class="onboard-content">

  <div class="main-wrapper">

    <!-- Top Green Section -->
    <div class="top-section">
      <h1 class="header-title">Welcome To<br>Expense Manager</h1>
    </div>

    <!-- Bottom White Card -->
    <div class="bottom-card">

      <div class="image-section">
        <div class="circle-bg">
          <img src="../../assets/coins.png" alt="Coins" class="coins-img" />
        </div>
      </div>

      <div class="footer-section">
        <h2 class="next-text">Next</h2>
        <div class="dots">
          <span class="dot dot-active"></span>
          <span class="dot dot-inactive"></span>
        </div>
      </div>

    </div>

  </div>

</ion-content>
